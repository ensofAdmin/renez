services:
  - type: web
    name: renez-backend
    env: python
    region: frankfurt
    plan: free

    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn renez.wsgi

    autoDeploy: true

    envVars:
      - key: DEBUG
        value: "False"

      - key: SECRET_KEY
        sync: false

      - key: DATABASE_URL
        fromDatabase:
          name: renez-postgres
          property: connectionString

      - key: R2_ACCESS_KEY
        sync: false

      - key: R2_SECRET_KEY
        sync: false

      - key: R2_BUCKET_NAME
        value: "renez-gallery"

      - key: R2_ENDPOINT_URL
        value: "https://<your-account-id>.r2.cloudflarestorage.com"

      - key: GOOGLE_CLIENT_ID
        sync: false

      - key: GOOGLE_CLIENT_SECRET
        sync: false

      - key: REPLICATE_API_TOKEN
        sync: false

      - key: PHOTOROOM_API_KEY
        sync: false

      - key: DOMAIN
        value: "api.renezbeauty.com"

databases:
  - name: renez-postgres
    plan: free
    region: frankfurt
